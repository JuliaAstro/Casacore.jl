version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
  - package-ecosystem: "julia"
    directory: "/"
    schedule:
      interval: "weekly"
    ignore:
      - dependency-name: "Casacore" # Ignore package itself
    groups: # group all julia package updates into a single PR
      all-julia-packages:
        patterns:
          - "*"
